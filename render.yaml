services:
  # Backend Flask API
  - type: web
    name: loan-prediction-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -c "import os; exec(open('model.py').read()) if not os.path.exists('models/loan_model.pkl') else print('Model already exists')"
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
    healthCheckPath: /api/health

  # Frontend React App
  - type: web
    name: loan-prediction-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: VITE_API_URL
        value: https://loan-prediction-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
